<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sales Entry-Nyondo General Hardware</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../static/sales.css" />
  </head>
  <body>
    <header>
      <h1>NYONDO GENERAL HARDWARE LTD</h1>
      <p>
        Your trusted partner for quality building materials and hardware
        solutions.
      </p>
      <div class="logo-container">
        <img
          src="../static/images/logo.png"
          alt="nyondo logo"
          width="200"
        />
      </div>
    </header>
    <div class="container-fluid">
      <div class="row">
        <div class="col-4 bg-dark">
          <div class="sidebar">
            
            <a href="{% url 'dashboardsales' %}">Dashboard</a>
            <a href="{% url 'sales' %}">Sales</a>
            <a href="{% url 'credit' %}">Credit Scheme</a>
            <a href="{% url 'product' %}">Product</a>
            <a href="{% url 'login' %}">Logout</a>
          </div>
        </div>
        <div class="col-8">
          <form class=" form-box">
            <h1>Sales Entry Form</h1>
            <div class="row g-3">
              <h5>Basic Sales Information</h5>
              <div class="col">
                <label for="inputinvoicenumber" class="form-label">
                  Receipt Number</label
                >
                <input type="text" class="form-control" />
              </div>
              <div class="col">
                <label for="inputdateofsale" class="form-label"
                  >Date Of Sale</label
                >
                <input type="date" class="form-control" />
              </div>
            </div>
            <div class="row">
              <div class="col">
                <label for="inputsalesperson" class="form-label"
                  >Sales Person</label
                >
                <input type="text" class="form-control" />
              </div>
              <div class="col">
                <label for="inputsalestatus" class="form-label"
                  >Sale Status</label
                >
                <select
                  class="form-select form-select-sm"
                  aria-label="Small select example"
                >
                  <option selected>select sale status</option>
                  <option value="1">Completed</option>
                  <option value="2">Pending</option>
                  <option value="3">cancelled</option>
                  <option value="4">Refunded</option>
                </select>
              </div>
            </div>
            <div class="row g-3">
              <h5>Item Details</h5>
              <div class="col">
                <label for="inputitemname" class="form-label">Item Name</label>
                <input type="text" class="form-control" />
              </div>
              <div class="col">
                <label for="inputitemname" class="form-label"> Quantity</label>
                <input type="text" class="form-control" />
              </div>
              <div class="col">
                <label for="inputbrand" class="form-label"> Brand</label>
                <input type="text" class="form-control" />
              </div>
            </div>
            <div class="row">
              <div class="col">
                <label for="inputunitprice" class="form-label"
                  >Unit Price</label
                >
                <input type="number" class="form-control" />
              </div>
              <div class="col">
                <label for="inputitemtype" class="form-label">Item Type</label>
                <select
                  class="form-select form-select-sm"
                  aria-label="Small select example"
                >
                  <option selected>select item category</option>
                  <option value="1">Building Materials</option>
                  <option value="2">Hand Tools</option>
                  <option value="3">Plumbing Supplies</option>
                  <option value="4">Fasteners</option>
                  <option value="4">Construction Equipments</option>
                  <option value="4">Power Tools</option>
                  <option value="4">Safety Gear</option>
                  <option value="4">Paint</option>
                </select>
              </div>
              <div class="col">
                <label for="inputtotalprice" class="form-label"
                  >Total Price</label
                >
                <input type="number" class="form-control" />
              </div>
            </div>
            <div class="row g-3">
              <h5>Customer Details</h5>
              <div class="col">
                <label for="inputname" class="form-label"> Name</label>
                <input type="text" class="form-control" />
              </div>
              <div class="col">
                <label for="inputcontact" class="form-label"
                  >Phone Number</label
                >
                <input type="number" class="form-control" />
              </div>
            </div>
            <div class="row">
              <div class="col">
                <label for="inputsalesperson" class="form-label">Email</label>
                <input type="email" class="form-control" />
              </div>
              <div class="col">
                <label for="inputitemtype" class="form-label"
                  >Customer Type</label
                >
                <select
                  class="form-select form-select-sm"
                  aria-label="Small select example"
                >
                  <option selected>select customer type</option>
                  <option value="1">Wholesaler</option>
                  <option value="2">Retailer</option>
                  <option value="3">Individual</option>
                  <option value="4">credit Scheme</option>
                </select>
              </div>
            </div>
            <div class="row g-3">
              <h5>Payment Details</h5>
              <div class="col">
                <label for="inputitemname" class="form-label"
                  >Payment Method</label
                >
                <select
                  class="form-select form-select-sm"
                  aria-label="Small select example"
                >
                  <option selected>select method</option>
                  <option value="1">Cash</option>
                  <option value="2">Mobile Money</option>
                  <option value="3">Card</option>
                </select>
              </div>
              <div class="col">
                <label for="inputitemname" class="form-label">Sold by:</label>
                <input
                  type="text"
                  class="form-control"
                  placeholder="sales Person name"
                />
              </div>
            </div>
            <div class="row">
              <div class="d-grid gap-2">
                <button class="btn btn-primary" type="button">
                  Record Sale
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
    <footer>
      <p>&copy .2026 Nyondo General Hardware LTD. All Rights Reserved</p>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
      integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
