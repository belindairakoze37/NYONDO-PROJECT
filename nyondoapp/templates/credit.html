<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Custom Credit Scheme</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../static/credit.css" />
  </head>
  <body>
    <header>
      <h1>Flexible Credit Options-Build Now, Pay Later</h1>
    </header>
    <div class="container-fluid">
      <div class="row">
        <div class="col-4 bg-dark">
          <div class="sidebar">
            <a href="#">Dashboard</a>
            <a href="{% url 'sales' %}">Sales</a>
            <a href="{% url 'credit'%}">Credit</a>
          </div>
        </div>
        <div class="col-8">
          <form class="form-box">
            <h1>Credit Application Form</h1>
            <div class="mb-3">
              <label for="formGroupExampleInput" class="form-label"
                >Customer Name</label
              >
              <input type="text" class="form-control" />
            </div>
            <div class="mb-3">
              <label for="formGroupExampleInput2" class="form-label"
                >Phone Number</label
              >
              <input type="number" class="form-control" />
            </div>
            <div class="mb-3">
              <label for="formGroupExampleInput2" class="form-label"
                >National ID</label
              >
              <input type="text" class="form-control" />
            </div>
            <div class="mb-3">
              <label for="formGroupExampleInput2" class="form-label"
                >Product(s) Requested On Credit</label
              >
              <input type="text" class="form-control" />
            </div>
            <div class="mb-3">
              <label for="formGroupExampleInput2" class="form-label"
                >Initial Pay / Deposit</label
              >
              <input type="number" class="form-control" />
            </div>
            <div class="mb-3">
              <label for="formGroupExampleInput2" class="form-label"
                >Payment Interval</label
              >
              <input
                type="text"
                class="form-control"
                placeholder=" select: 1month, 3month, 6month"
              />
            </div>
            <div class="mb-3">
              <label for="formGroupExampleInput2" class="form-label"
                >Preferred Payment Method</label
              >
              <input type="text" class="form-control" />
            </div>
            <div class="d-grid gap-2 col-6 mx-auto">
              <button class="btn btn-primary" type="button">
                Apply For Credit
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
      integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
